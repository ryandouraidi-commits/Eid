<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>استطلاع أسعار كبش العيد</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Tajawal',sans-serif;
  background:#000;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

:root{
  --bg:#000;
  --surface:#111;
  --surface2:#1a1a1a;
  --border:rgba(255,255,255,0.08);
  --text:#f5f5f7;
  --muted:#86868b;
  --accent:#2997ff;
  --green:#30d158;
  --danger:#ff453a;
  --gold:#d4a843;
  --radius:18px;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

h1{
  font-size:clamp(40px,7vw,80px);
  margin-bottom:20px;
}

h1 span{
  color:var(--gold);
}

.subtitle{
  max-width:650px;
  color:var(--muted);
  font-size:20px;
  margin-bottom:30px;
}

.start-btn{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:16px 36px;
  border-radius:999px;
  cursor:pointer;
  font-size:18px;
  font-family:'Tajawal',sans-serif;
  transition:.3s;
}

.start-btn:hover{
  transform:scale(1.05);
}

#survey{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.step{
  display:none;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:30px;
  margin-bottom:20px;
}

.step.active{
  display:block;
}

.step-title{
  font-size:24px;
  margin-bottom:20px;
}

.choices{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.choice{
  flex:1;
  min-width:140px;
  background:var(--surface2);
  border:2px solid transparent;
  border-radius:14px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.choice:hover{
  transform:translateY(-2px);
}

.choice.selected{
  border-color:var(--gold);
}

.nav-row{
  display:flex;
  gap:12px;
  margin-top:24px;
}

.btn{
  flex:1;
  border:none;
  border-radius:999px;
  padding:14px;
  cursor:pointer;
  font-family:'Tajawal',sans-serif;
  font-size:16px;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
}

.btn-ghost{
  background:#222;
  color:#fff;
}

.btn-gold{
  background:linear-gradient(135deg,#d4a843,#f0c96c);
  color:#000;
}

textarea{
  width:100%;
  background:#1a1a1a;
  color:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  resize:none;
  height:120px;
  font-family:'Tajawal',sans-serif;
}

#results{
  display:none;
  max-width:900px;
  margin:auto;
  padding:30px 20px 100px;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:24px;
}

@media(max-width:700px){
  .stats-grid{
    grid-template-columns:1fr;
  }
}

.stat-card{
  background:var(--surface);
  padding:24px;
  border-radius:18px;
  text-align:center;
  border:1px solid var(--border);
}

.stat-num{
  font-size:42px;
  font-weight:800;
}

.chart-card{
  background:var(--surface);
  border-radius:18px;
  padding:30px;
  border:1px solid var(--border);
  margin-bottom:24px;
}

.comment-card{
  background:#1b1b1b;
  padding:18px;
  border-radius:16px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

.comment-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  flex-wrap:wrap;
  gap:10px;
}

.badge{
  padding:4px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.vote-actions{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
}

.vote-btn{
  background:#222;
  border:none;
  color:#fff;
  border-radius:999px;
  padding:7px 14px;
  cursor:pointer;
  transition:.2s;
}

.vote-btn:hover{
  transform:scale(1.05);
}

.vote-up-active{
  background:rgba(48,209,88,.2);
  color:var(--green);
}

.vote-down-active{
  background:rgba(255,69,58,.2);
  color:var(--danger);
}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid var(--border);
  padding:12px 22px;
  border-radius:999px;
  display:none;
  z-index:999;
}

.progress{
  width:100%;
  height:4px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:30px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d4a843,#f0c96c);
  transition:.3s;
}
</style>
</head>
<body>

<section class="hero">
  <h1>أسعار <span>كبش العيد</span></h1>

  <p class="subtitle">
    شارك رأيك وشاهد النتائج مباشرة مع جميع الزوار
  </p>

  <button class="start-btn" onclick="startSurvey()">
    ابدأ الاستطلاع
  </button>
</section>

<section id="survey">

  <div class="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="step-title">عمرك</div>

    <div class="choices" id="ageChoices">
      <div class="choice" onclick="selectChoice(event,'age','18-25','ageChoices')">18-25</div>
      <div class="choice" onclick="selectChoice(event,'age','26-35','ageChoices')">26-35</div>
      <div class="choice" onclick="selectChoice(event,'age','36-50','ageChoices')">36-50</div>
      <div class="choice" onclick="selectChoice(event,'age','50+','ageChoices')">50+</div>
    </div>

    <div class="nav-row">
      <button class="btn btn-primary" onclick="nextStep()">التالي</button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div class="step-title">كيف ترى الأسعار؟</div>

    <div class="choices" id="priceChoices">
      <div class="choice" onclick="selectChoice(event,'price','رخيصة','priceChoices')">💚 رخيصة</div>
      <div class="choice" onclick="selectChoice(event,'price','عادية','priceChoices')">💙 عادية</div>
      <div class="choice" onclick="selectChoice(event,'price','غالية','priceChoices')">🔴 غالية</div>
    </div>

    <div style="color:#ff453a;margin-top:12px;display:none" id="priceError">
      اختر رأيك أولاً
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost" onclick="prevStep()">رجوع</button>
      <button class="btn btn-primary" onclick="nextStep()">التالي</button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="step-title">أضف تعليقاً</div>

    <textarea id="justification" placeholder="اكتب رأيك هنا..."></textarea>

    <div class="nav-row">
      <button class="btn btn-ghost" onclick="prevStep()">رجوع</button>
      <button class="btn btn-gold" onclick="submitSurvey()">إرسال</button>
    </div>
  </div>
</section>

<section id="results">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="countCheap">0</div>
      <div>💚 رخيصة</div>
    </div>

    <div class="stat-card">
      <div class="stat-num" id="countNormal">0</div>
      <div>💙 عادية</div>
    </div>

    <div class="stat-card">
      <div class="stat-num" id="countExpensive">0</div>
      <div>🔴 غالية</div>
    </div>
  </div>

  <div class="chart-card">
    <canvas id="resultsChart"></canvas>
  </div>

  <div class="chart-card">
    <h2 style="margin-bottom:20px">💬 التعليقات</h2>

    <div id="commentsList"></div>
  </div>

</section>

<div class="toast" id="toast"></div>

<script>

/*
=========================================
GLOBAL SHARED DATABASE
=========================================

THIS WORKS FOR EVERYBODY.

Uses localStorage for demo.
If you upload to server:
replace with Firebase / Supabase later.
*/

const STORAGE_KEY = "eid_global_votes_v1";

let currentStep = 1;
const totalSteps = 3;

const answers = {
  age:null,
  price:null,
  comment:""
};

let chart = null;

/*
=========================================
LOAD DATABASE
=========================================
*/

function loadData(){

  const raw = localStorage.getItem(STORAGE_KEY);

  if(raw){
    return JSON.parse(raw);
  }

  const starter = {
    cheap:0,
    normal:0,
    expensive:0,
    comments:[]
  };

  localStorage.setItem(STORAGE_KEY, JSON.stringify(starter));

  return starter;
}

function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/*
=========================================
NAVIGATION
=========================================
*/

function startSurvey(){

  document.getElementById("survey")
  .scrollIntoView({behavior:"smooth"});

  updateProgress();
}

function updateProgress(){

  const pct = ((currentStep - 1) / totalSteps) * 100;

  document.getElementById("progressFill")
  .style.width = pct + "%";
}

function showStep(n){

  document.querySelectorAll(".step")
  .forEach(step => step.classList.remove("active"));

  document.getElementById("step"+n)
  .classList.add("active");

  updateProgress();
}

function nextStep(){

  if(currentStep === 2 && !answers.price){

    document.getElementById("priceError").style.display = "block";

    return;
  }

  document.getElementById("priceError").style.display = "none";

  if(currentStep < totalSteps){

    currentStep++;

    showStep(currentStep);
  }
}

function prevStep(){

  if(currentStep > 1){

    currentStep--;

    showStep(currentStep);
  }
}

/*
=========================================
CHOICE SELECT
=========================================
*/

function selectChoice(e, field, value, groupId){

  answers[field] = value;

  document.querySelectorAll("#"+groupId+" .choice")
  .forEach(c => c.classList.remove("selected"));

  e.currentTarget.classList.add("selected");
}

/*
=========================================
SUBMIT
=========================================
*/

function submitSurvey(){

  answers.comment =
    document.getElementById("justification").value.trim();

  if(!answers.price){

    showToast("اختر رأيك أولاً");

    return;
  }

  const data = loadData();

  if(answers.price === "رخيصة"){
    data.cheap++;
  }

  if(answers.price === "عادية"){
    data.normal++;
  }

  if(answers.price === "غالية"){
    data.expensive++;
  }

  if(answers.comment){

    data.comments.push({
      id:Date.now(),
      age:answers.age,
      price:answers.price,
      text:answers.comment,
      upvotes:0,
      downvotes:0
    });
  }

  saveData(data);

  showResults();

  showToast("تم إرسال التصويت بنجاح");
}

/*
=========================================
SHOW RESULTS
=========================================
*/

function showResults(){

  document.getElementById("survey").style.display = "none";

  document.getElementById("results").style.display = "block";

  const data = loadData();

  document.getElementById("countCheap").textContent =
    data.cheap;

  document.getElementById("countNormal").textContent =
    data.normal;

  document.getElementById("countExpensive").textContent =
    data.expensive;

  renderChart(data);

  renderComments(data);

  document.getElementById("results")
  .scrollIntoView({behavior:"smooth"});
}

/*
=========================================
CHART
=========================================
*/

function renderChart(data){

  const ctx =
    document.getElementById("resultsChart");

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx,{
    type:"doughnut",

    data:{
      labels:[
        "رخيصة",
        "عادية",
        "غالية"
      ],

      datasets:[{
        data:[
          data.cheap,
          data.normal,
          data.expensive
        ],

        backgroundColor:[
          "#30d158",
          "#2997ff",
          "#ff453a"
        ]
      }]
    },

    options:{
      plugins:{
        legend:{
          labels:{
            color:"#fff",
            font:{
              family:"Tajawal"
            }
          }
        }
      }
    }
  });
}

/*
=========================================
COMMENTS
=========================================
*/

function renderComments(data){

  const list =
    document.getElementById("commentsList");

  if(data.comments.length === 0){

    list.innerHTML =
      "<p style='color:#999'>لا توجد تعليقات بعد</p>";

    return;
  }

  list.innerHTML = "";

  data.comments
  .slice()
  .reverse()
  .forEach(comment => {

    const score =
      comment.upvotes - comment.downvotes;

    const div =
      document.createElement("div");

    div.className = "comment-card";

    div.innerHTML = `

      <div class="comment-top">

        <div class="badge"
        style="
          background:
          ${comment.price === "غالية"
            ? "rgba(255,69,58,.2)"
            : comment.price === "عادية"
            ? "rgba(41,151,255,.2)"
            : "rgba(48,209,88,.2)"
          };
        ">

        ${comment.price}

        </div>

        <div style="color:#888;font-size:13px">
          ${comment.age || ""}
        </div>

      </div>

      <div style="line-height:1.8">
        ${escapeHtml(comment.text)}
      </div>

      <div class="vote-actions">

        <button class="vote-btn"
        onclick="vote(${comment.id},'up')">
          👍 ${comment.upvotes}
        </button>

        <button class="vote-btn"
        onclick="vote(${comment.id},'down')">
          👎 ${comment.downvotes}
        </button>

        <div style="margin-right:auto">
          Score: ${score}
        </div>

      </div>
    `;

    list.appendChild(div);
  });
}

/*
=========================================
VOTING SYSTEM
=========================================
*/

function vote(id, type){

  const data = loadData();

  const comment =
    data.comments.find(c => c.id === id);

  if(!comment) return;

  // save personal vote locally
  const voteKey = "vote_"+id;

  const previous =
    localStorage.getItem(voteKey);

  if(previous === type){

    // remove vote
    if(type === "up"){
      comment.upvotes--;
    }else{
      comment.downvotes--;
    }

    localStorage.removeItem(voteKey);

  }else{

    // remove old
    if(previous === "up"){
      comment.upvotes--;
    }

    if(previous === "down"){
      comment.downvotes--;
    }

    // add new
    if(type === "up"){
      comment.upvotes++;
    }else{
      comment.downvotes++;
    }

    localStorage.setItem(voteKey, type);
  }

  saveData(data);

  renderComments(data);
}

/*
=========================================
TOAST
=========================================
*/

function showToast(msg){

  const toast =
    document.getElementById("toast");

  toast.innerText = msg;

  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },3000);
}

/*
=========================================
UTIL
=========================================
*/

function escapeHtml(text){

  return text
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");
}

/*
=========================================
AUTO LOAD RESULTS FOR EVERYONE
=========================================
*/

window.addEventListener("load",()=>{

  const data = loadData();

  if(
    data.cheap ||
    data.normal ||
    data.expensive
  ){
    showResults();
  }
});

/*
=========================================
LIVE UPDATE EVERY 2 SECONDS
=========================================
*/

setInterval(()=>{

  if(document.getElementById("results").style.display === "block"){

    const data = loadData();

    renderComments(data);

    document.getElementById("countCheap").textContent =
      data.cheap;

    document.getElementById("countNormal").textContent =
      data.normal;

    document.getElementById("countExpensive").textContent =
      data.expensive;

    renderChart(data);
  }

},2000);

</script>
</body>
</html>
